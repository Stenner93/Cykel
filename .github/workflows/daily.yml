name: 🚴 TdF Manager — Daglig opdatering

# ── Hvornår kører workflowet? ────────────────────────────────────────────────
on:

  # 1. Automatiske kørsler (tider i UTC — dansk sommertid CEST = UTC+2).
  #    Scraper Holdet (priser, GC, trøjer, startliste/DNS) + gen-beregner
  #    forudsigelser og holdanbefaling. CO/PCS blokerer CI's IP, men de er
  #    cachede/stabile — de ekstra kørsler henter frisk Holdet-data.
  schedule:
    - cron: '0 5 * * *'        # 07:00 dansk — morgenopdatering
    # 11:00–14:30 dansk hver halve time: dækker den variable Holdet-deadline.
    # For enhver deadline i vinduet får man automatisk en kørsel ~1 time før
    # OG ~0,5 time før (frisk pris/startliste + gen-beregnede point til deadline).
    - cron: '0,30 9-12 * * *'
    - cron: '30 19 * * *'      # 21:30 dansk — aftenopdatering (efter etapen: GT-resultater m.m.)

  # 2. Manuel kørsel fra GitHub-app eller browser (også på telefon).
  #    Alle felter er valgfrie — lades de tomme, auto-detekteres etape + type
  #    fra Holdets live-program.
  workflow_dispatch:
    inputs:
      stage:
        description: 'Etapenummer (lad tomt = auto-detect fra Holdet)'
        required: false
        default: ''
        type: string
      stage_type:
        description: 'Etapetype (lad tom = auto-detect fra Holdet)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - sprint
          - mountain
          - tt
          - ttt
          - hilly
          - cobbled
      veloscore_path:
        description: 'Sti til VeloScore JSON (lades tom for standard)'
        required: false
        default: ''
        type: string

# ── Rettigheder: skrive/push til repo + deploye til GitHub Pages ────────────
permissions:
  contents: write
  pages: write
  id-token: write

# ── Kun én kørsel ad gangen: forhindrer git push-race mellem de hyppige
#    dag-kørsler. En ny kørsel venter i kø frem for at overlappe.
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    name: Opdatér data og anbefalinger
    runs-on: ubuntu-latest

    steps:
      # ── 1. Hent koden ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Sæt Python op ────────────────────────────────────────────────────
      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installér afhængigheder
        run: pip install -r requirements.txt

      # ── 3. Scrape Holdet (priser + GC + trøjer + mit hold) ────────────────
      - name: Scrape Holdet.dk
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/scrape/scrape_holdet.py \
            --cartridge tour-de-france-2026 \
            --my-team-id 7145433 \
            --update-riders \
            || echo "⚠️  Holdet-scrape slog fejl (TdF ikke live endnu?) — fortsætter med cached data"

      # ── 3b. Hent GT-etaperesultater (til ML rolling-form) ─────────────────
      - name: Hent GT-etaperesultater (ML)
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/scrape/scrape_gt_results.py \
            || echo "⚠️  GT-resultater ikke tilgængelige endnu — fortsætter uden ML rolling-form"

      # ── 3c. Hent PCS 12-måneders rangering (kvalitetssignal) ──────────────
      - name: Hent PCS rangering
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/scrape/scrape_pcs_rankings.py \
            || echo "⚠️  PCS rangering ikke tilgængelig — fortsætter uden"

      # ── 3d. Hent PCS form-scores (90-dages resultater, ~5 min) ───────────
      - name: Hent PCS form-scores
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/scrape/scrape_pcs.py \
            --riders-file data/cache/tdf2026_players.json \
            || echo "⚠️  PCS form-scores ikke tilgængelige — fortsætter med cached data"

      # ── 3e. Hent CyclingOracle ratings (~4 min) ───────────────────────────
      - name: Hent CyclingOracle ratings
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/scrape/scrape_co.py \
            --riders-file data/cache/tdf2026_players.json \
            || echo "⚠️  CyclingOracle ikke tilgængeligt — fortsætter med cached data"

      # ── 4. Byg TdF spillerliste (skal ske FØR run_daily.py så vi har aktuelle priser) ──
      - name: Byg TdF 2026 dashboard-data
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/build/build_tdf_web_data.py --delay 0.5 \
            || echo "⚠️  TdF build slog fejl — fortsætter"

      # ── 4b. Byg Analytik JSON (alle etaper, Holdet-ryttere, CO + PCS) ───────
      - name: Byg Analytik-data
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/build/build_analytics.py \
            || echo "⚠️  Analytik-build slog fejl — fortsætter"

      # ── 5. Kør forudsigelser ────────────────────────────────────────────────
      #    Altid — enten med bruger-angivne værdier eller auto-detekteret etape.
      #    Scriptet finder selv etape + type fra Holdets program hvis ikke angivet.
      - name: Kør holdanbefalinger
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # Byg argumentliste — udelad tom stage/type så run_daily.py auto-detecter
          ARGS=""
          if [ -n "${{ inputs.stage }}" ]; then
            ARGS="$ARGS --stage ${{ inputs.stage }}"
          fi
          if [ -n "${{ inputs.stage_type }}" ]; then
            ARGS="$ARGS --type ${{ inputs.stage_type }}"
          fi
          if [ -n "${{ inputs.veloscore_path }}" ]; then
            ARGS="$ARGS --veloscore ${{ inputs.veloscore_path }}"
          fi

          python scripts/run_daily.py $ARGS \
            || echo "⚠️  Forudsigelser slog fejl (ingen aktiv etape?) — fortsætter"

      # ── 6. Byg Dauphiné web-data ───────────────────────────────────────────
      - name: Byg Dauphiné 2026 dashboard-data
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/build/build_dauphine_web_data.py --delay 0.5 \
            || echo "⚠️  Dauphiné build slog fejl — fortsætter"

      # ── 7. Byg rytterdatabase (diagnostik-side, tvaers af alle loeb) ──────
      - name: Byg rytterdatabase
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/build/build_rider_database.py \
            || echo "⚠️  Rytterdatabase-build slog fejl — fortsætter"

      # ── 6. Commit og push opdateret data ───────────────────────────────────
      - name: Commit og push resultater
        env:
          PYTHONIOENCODING: utf-8
        run: |
          git config user.name  "TdF Manager Bot"
          git config user.email "bot@users.noreply.github.com"

          # Tilføj web-output (predictions + scores — formålet med CI-kørslen)
          git add web/data/ data/riders.json data/current_team.json || true

          # Tilføj alle caches der opdateres dagligt
          git add \
            data/cache/pcs_form.json \
            data/cache/cyclingoracle.json \
            data/cache/holdet_players.json \
            data/cache/stage_snapshots.json \
            data/cache/gc_standings.json \
            data/cache/jerseys.json \
            data/cache/holdet_sprint_kom.json \
            data/cache/holdet_team_bonus.json \
            data/cache/dauphine2026_players.json \
            data/cache/tdf2026_players.json \
            data/cache/pcs_stage_types.json \
            data/cache/pcs_profile_scores.json \
            data/cache/gt_stage_results.json \
            data/cache/pcs_rankings.json \
            data/stage_context.json \
            || true

          # Commit kun hvis der er ændringer
          if git diff --staged --quiet; then
            echo "Ingen ændringer — intet at committe"
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.stage }}" ]; then
              MSG="🚴 Etape ${{ inputs.stage }} (${{ inputs.stage_type }}) — $(date -u +%Y-%m-%d)"
            else
              MSG="⏰ Daglig opdatering — $(date -u '+%Y-%m-%d %H:%M UTC')"
            fi
            git commit -m "$MSG"
            # Push med rebase-fallback i tilfælde af samtidige kørsler
            git push || (git pull --rebase --autostash origin main && git push)
            echo "✅ Push lykkedes: $MSG"
          fi

      # ── 7. Upload web/ som Pages-artefakt (deployes i 'deploy'-jobbet) ──────
      #    Kører altid — også uden data-ændringer — så en tidligere fejlet
      #    publicering selvhelbreder ved næste kørsel.
      - name: Upload Pages-artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web'

  # ── JOB 2: Publicér til GitHub Pages ──────────────────────────────────────
  #    Én ren deploy pr. kørsel (præcis én artefakt), sekventeret af 'update'.
  #    Fejler den pga. Pages-flakiness, retter næste daglige kørsel det selv.
  deploy:
    name: Publicér til GitHub Pages
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
