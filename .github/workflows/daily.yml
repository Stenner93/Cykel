name: 🚴 TdF Manager — Daglig opdatering

# ── Hvornår kører workflowet? ────────────────────────────────────────────────
on:

  # 1. Automatisk kl. 21:30 dansk tid (19:30 UTC) hver dag under løbet.
  #    Bruges til at hente friske Holdet-priser, GC-stilling og trøjer.
  schedule:
    - cron: '30 19 * * *'

  # 2. Manuel kørsel — kan startes fra GitHub-app eller browser på telefon.
  #    Udfyld etapenummer og etapetype for at generere holdanbefalinger.
  workflow_dispatch:
    inputs:
      stage:
        description: 'Etapenummer (f.eks. 5)'
        required: true
        default: '1'
        type: string
      stage_type:
        description: 'Etapetype'
        required: true
        default: 'sprint'
        type: choice
        options:
          - sprint
          - mountain
          - tt
          - hilly
          - cobbled
      update_riders:
        description: 'Opdater rytterpris i riders.json fra Holdet?'
        required: false
        default: false
        type: boolean
      veloscore_path:
        description: 'Sti til VeloScore JSON (lades tom for standard)'
        required: false
        default: ''
        type: string

# ── Rettigheder: skal kunne skrive og push til repo ─────────────────────────
permissions:
  contents: write

jobs:
  update:
    name: Opdatér data og anbefalinger
    runs-on: ubuntu-latest

    steps:
      # ── 1. Hent koden ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Sæt Python op ────────────────────────────────────────────────────
      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installér afhængigheder
        run: pip install -r requirements.txt

      # ── 3. Scrape Holdet (priser + GC + trøjer) ────────────────────────────
      - name: Scrape Holdet.dk
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # Forsøg at auto-opdage TdF 2026 cartridge.
          # Når TdF ikke er live endnu, falder scriptet blot stille tilbage.
          python scrape_holdet.py \
            --cartridge tour-de-france-2026 \
            ${{ inputs.update_riders == 'true' && '--update-riders' || '' }} \
            || echo "⚠️  Holdet-scrape slog fejl (TdF ikke live endnu?) — fortsætter med cached data"

      # ── 4. Kør forudsigelser (kun ved manuel dispatch) ─────────────────────
      - name: Kør holdanbefalinger
        if: github.event_name == 'workflow_dispatch'
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # Bestem VeloScore-sti
          if [ -n "${{ inputs.veloscore_path }}" ]; then
            VS_ARG="--veloscore ${{ inputs.veloscore_path }}"
          else
            VS_ARG=""
          fi

          python run_daily.py \
            --stage ${{ inputs.stage }} \
            --type  ${{ inputs.stage_type }} \
            $VS_ARG

      # ── 5. Commit og push opdateret data ───────────────────────────────────
      - name: Commit og push resultater
        env:
          PYTHONIOENCODING: utf-8
        run: |
          git config user.name  "TdF Manager Bot"
          git config user.email "bot@users.noreply.github.com"

          # Tilføj alle ændrede datafiler
          git add web/data/ data/cache/ data/riders.json || true

          # Commit kun hvis der er ændringer
          if git diff --staged --quiet; then
            echo "Ingen ændringer — intet at committe"
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              MSG="🚴 Etape ${{ inputs.stage }} (${{ inputs.stage_type }}) — $(date -u +%Y-%m-%d)"
            else
              MSG="⏰ Daglig Holdet-opdatering — $(date -u +%Y-%m-%d)"
            fi
            git commit -m "$MSG"
            git push
            echo "✅ Push lykkedes: $MSG"
          fi
